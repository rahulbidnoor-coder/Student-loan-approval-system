<!DOCTYPE html>
<html>
<head>
    <title>Repayment Plans</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;

            /* 🔥 Background Image */
            background: url("https://images.unsplash.com/photo-1601597111158-2fceff292cdc") no-repeat center center/cover;
            height: 100vh;
        }

        /* Dark overlay for readability */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        h2 {
            margin-top: 30px;
            color: white;
            font-size: 30px;
        }

        .plans {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            width: 220px;
            color: black;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.07);
        }

        .card h3 {
            font-size: 24px;
        }

        /* Buttons */
        button {
            margin-top: 15px;
            padding: 12px;
            width: 100%;
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: linear-gradient(45deg, #ff9966, #ff5e62);
        }

        /* EMI Box */
        .emi-box {
            margin: 40px auto;
            padding: 25px;
            width: 340px;
            background: white;
            border-radius: 15px;
            font-size: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: none;
        }

        .emi-box span {
            color: #e63946;
            font-weight: bold;
        }

    </style>
</head>

<body>

<h2>💳 Choose Your Repayment Plan</h2>

<div class="plans">
    <div class="card">
        <h3>5 Years</h3>
        <button onclick="selectPlan(5)">Select Plan</button>
    </div>

    <div class="card">
        <h3>7 Years</h3>
        <button onclick="selectPlan(7)">Select Plan</button>
    </div>

    <div class="card">
        <h3>10 Years</h3>
        <button onclick="selectPlan(10)">Select Plan</button>
    </div>
</div>

<div class="emi-box" id="emiResult"></div>

<script>
const loan = {{ loan|default:0 }};

function selectPlan(years) {
    let rate = 0.08 / 12;
    let months = years * 12;

    let emi = (loan * rate * Math.pow(1+rate, months)) /
              (Math.pow(1+rate, months) - 1);

    emi = Math.round(emi);

    document.getElementById("emiResult").style.display = "block";

    document.getElementById("emiResult").innerHTML =
        "📊 Plan: <span>" + years + " Years</span><br><br>" +
        "💰 Loan Amount: <span>₹" + loan + "</span><br><br>" +
        "💵 Monthly EMI: <span>₹" + emi + "</span>";
}
</script>

</body>
</html>
